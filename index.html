<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hax Cyberpunk TDEE Engine v3.0</title>
    <style>
        :root {
            --bg-color: #060913;
            --card-bg: rgba(17, 24, 39, 0.7);
            --neon-green: #39ff14;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-yellow: #fff000;
            --text-color: #f3f4f6;
            --text-muted: #6b7280;
            --border-glow: rgba(0, 240, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(0, 240, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(57, 255, 20, 0.03) 0px, transparent 50%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Glassmorphism + Neon Shadow Card */
        .tdee-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(255,255,255,0.02);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.5));
        }

        .tagline {
            text-align: center;
            color: var(--neon-green);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
            opacity: 0.8;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        /* High-tech Gender Toggles */
        .gender-container {
            display: flex;
            gap: 15px;
        }

        .gender-option {
            flex: 1;
            text-align: center;
            background: rgba(31, 41, 55, 0.5);
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .gender-option input { display: none; }
        
        .gender-option:hover {
            border-color: rgba(0, 240, 255, 0.5);
            background: rgba(31, 41, 55, 0.8);
        }

        .gender-option:has(input:checked) {
            border-color: var(--neon-blue);
            background: rgba(0, 240, 255, 0.15);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        /* Futuristic Inputs */
        input[type="number"], select {
            width: 100%;
            padding: 14px;
            background-color: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.25);
            background-color: rgba(17, 24, 39, 1);
        }

        /* SCREEN DISPLAY */
        .results-section {
            background-color: rgba(6, 9, 19, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-top: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Laser line at the top of results */
        .results-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
        }

        .main-tdee {
            font-size: 46px;
            font-weight: 900;
            color: var(--neon-green);
            filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.6));
            margin: 10px 0;
            font-family: monospace;
        }

        .goals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .goal-box {
            background: rgba(17, 24, 39, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: transform 0.2s, border-color 0.2s;
        }

        .goal-box:hover {
            transform: translateY(-2px);
        }

        .goal-box.bulk { border-bottom: 3px solid var(--neon-pink); }
        .goal-box.bulk:hover { border-color: var(--neon-pink); box-shadow: 0 5px 15px rgba(255, 0, 127, 0.15); }
        
        .goal-box.cut { border-bottom: 3px solid var(--neon-yellow); }
        .goal-box.cut:hover { border-color: var(--neon-yellow); box-shadow: 0 5px 15px rgba(255, 240, 0, 0.15); }

        .goal-box span {
            display: block;
            font-weight: bold;
            font-size: 18px;
            margin-top: 8px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="tdee-card">
    <h1>Hax TDEE Engine</h1>
    <div class="tagline">Hax Fitness Matrix</div>

    <!-- GENDER -->
    <div class="input-group">
        <label>Kasarian Yarn? (Gender)</label>
        <div class="gender-container">
            <label class="gender-option">
                <input type="radio" name="gender" value="male" checked onchange="calculateTDEE()"> EKALAL
            </label>
            <label class="gender-option">
                <input type="radio" name="gender" value="female" onchange="calculateTDEE()"> EABAB
            </label>
        </div>
    </div>

    <!-- AGE & WEIGHT -->
    <div class="input-row">
        <div class="input-group">
            <label>Edad mo Kupal (Taon)</label>
            <input type="number" id="age" value="" min="1" max="100" oninput="calculateTDEE()">
        </div>
        <div class="input-group">
            <label>Weight mo Loko (kg)</label>
            <input type="number" id="weight" value="" min="1" oninput="calculateTDEE()">
        </div>
    </div>

    <!-- HEIGHT -->
    <div class="input-group">
        <label> Height mo Siraulo (cm)</label>
        <input type="number" id="height" value="" min="1" oninput="calculateTDEE()">
    </div>

    <!-- ACTIVITY LEVEL -->
    <div class="input-group">
        <label>Gawain sa Buhay/Activity Level (BAWAL NAG LULU)</label>
        <select id="activity" onchange="calculateTDEE()">
            <option value="1.2">Sedentary (Walang workout batugan yarn / Office job)</option>
            <option value="1.375">(Lightly Active) pwede na (Gym 1-3 araw/linggo)</option>
            <option value="1.55" selected>(Moderately Active) Wow palo! (Gym 3-5 araw/linggo)</option>
            <option value="1.725">Very (Active) si BatMan kaba? (Mabigat na Gym 6-7 araw/linggo)</option>
        </select>
    </div>

    <!-- RESULTS PANEL -->
    <div class="results-section">
        <label style="color: var(--neon-blue);">Maintenance Calories (TDEE)</label>
        <div class="main-tdee"><span id="tdee-val"></span>0</div>
        <p style="font-size: 11px; color: var(--text-muted); margin: 5px 0 0 0;">eto ang energy para ma-maintain ang lakas mo at timbang kapag iniwan ka nya</p>

        <!-- FITNESS GOALS -->
        <div class="goals-grid">
            <div class="goal-box bulk">
                <span style="font-size: 11px; color: var(--text-muted); text-transform: uppercase;">Bulking (Magpalaki ng gummy worms)</span>
                <span style="color: var(--neon-pink);" id="bulk-val">0</span>
            </div>
            <div class="goal-box cut">
                <span style="font-size: 11px; color: var(--text-muted); text-transform: uppercase;">Cutting (Magbawas ng kagaguhan)</span>
                <span style="color: var(--neon-yellow);" id="cut-val">0</span>
            </div>
        </div>
    </div>
</div>

<script>
function calculateTDEE() {
    const gender = document.querySelector('input[name="gender"]:checked').value;
    const age = parseFloat(document.getElementById('age').value) || 0;
    const weight = parseFloat(document.getElementById('weight').value) || 0;
    const height = parseFloat(document.getElementById('height').value) || 0;
    const activity = parseFloat(document.getElementById('activity').value);

    if (age <= 0 || weight <= 0 || height <= 0) return;

    let bmr = 0;
    if (gender === 'male') {
        bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
    } else {
        bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
    }

    const tdee = Math.round(bmr * activity);
    const bulk = tdee + 500;
    const cut = tdee - 500;

    document.getElementById('tdee-val').innerText = tdee.toLocaleString();
    document.getElementById('bulk-val').innerText = bulk.toLocaleString() + " CALORIES";
    document.getElementById('cut-val').innerText = cut.toLocaleString() + " CALORIES";
}

// Automatic computation as soon as page displays
window.onload = function() {
    calculateTDEE();
};
</script>

</body>
</html>
